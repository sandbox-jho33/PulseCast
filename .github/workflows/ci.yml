name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint backend
        run: uv run ruff check app tests
      - name: Test backend
        env:
          SUPABASE_URL: ""
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint frontend
        run: bun run lint
      - name: Build frontend
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci
        run: bun run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v5
      - name: Build backend image
        run: docker build -f backend/Dockerfile backend
      - name: Build frontend image
        run: docker build --build-arg VITE_CLERK_PUBLISHABLE_KEY=pk_test_ci -f frontend/Dockerfile frontend
